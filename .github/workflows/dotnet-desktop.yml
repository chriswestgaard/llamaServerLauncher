name: Build and Release

on:
  push:
    branches: [ "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build
        run: dotnet build LlamaServerLauncher.csproj -c Release

      - name: Publish self-contained EXE
        if: startsWith(github.ref, 'refs/tags/v')
        run: dotnet publish LlamaServerLauncher.csproj -c Release -r win-x64 -p:PublishSingleFile=true --self-contained -o ./publish

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ./publish/LlamaServerLauncher.exe
          generate_release_notes: true
